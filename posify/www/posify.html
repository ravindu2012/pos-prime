<!DOCTYPE html>
<html lang="en" data-theme-mode="{{ desk_theme }}" data-theme="{{ desk_theme }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posify</title>
    <script type="module" crossorigin src="/assets/posify/frontend/assets/index-q-dBW6VP.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/posify/frontend/assets/index-KOdod_Fy.css">
    <script>window.csrf_token = "{{ frappe.session.csrf_token }}";</script>
  <script>
    (function() {
      var m = document.documentElement.getAttribute("data-theme-mode");
      if (m === "automatic") {
        var q = window.matchMedia("(prefers-color-scheme: dark)");
        document.documentElement.setAttribute("data-theme", q.matches ? "dark" : "light");
        q.addEventListener("change", function(e) {
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
        });
      }
    })();
  </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
